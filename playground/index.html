<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gdui Preview</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #020617; color: #f8fafc; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .preview { width: min(960px, 100%); border: 1px solid #334155; border-radius: 18px; overflow: hidden; background: #0f172a; }
    .bar { padding: 12px 16px; background: #111827; color: #cbd5e1; border-bottom: 1px solid #334155; }
    iframe { display: block; width: 100%; height: 680px; border: 0; }
  </style>
</head>
<body>
  <div class="preview">
    <div class="bar">Preview visual simples. Fonte real continua sendo .gdui.html -> AST -> .tscn.</div>
    <iframe src="preview.html"></iframe>
  </div>
</body>
</html>
