<gd-screen name="ResponsiveGridScreen" anchor="full" background="#0b1120">
  <gd-vbox name="Root" anchor="full" padding="32" gap="18">
    <gd-label text="Grid responsivo" color="#f8fafc" font-size="32" tv:font-size="44" />
    <gd-label text="Default 2 colunas, md 3, lg 4, tv 6" color="#94a3b8" font-size="16" />
    <gd-grid name="ResponsiveGrid" columns="2" md:columns="3" lg:columns="4" tv:columns="6" gap="14" tv:gap="24">
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 1" color="#f8fafc" /></gd-card>
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 2" color="#f8fafc" /></gd-card>
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 3" color="#f8fafc" /></gd-card>
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 4" color="#f8fafc" /></gd-card>
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 5" color="#f8fafc" /></gd-card>
      <gd-card background="#1e293b" radius="14" padding="16"><gd-label text="Slot 6" color="#f8fafc" /></gd-card>
    </gd-grid>
  </gd-vbox>
</gd-screen>
