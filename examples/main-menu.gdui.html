<gd-screen name="MainMenuScreen" anchor="full" background="#101820" theme="res://scenes/theme.tres">
  <gd-vbox name="Root" anchor="full" padding="48" gap="22">
    <gd-spacer height="80" />
    <gd-label name="GameTitle" text="Skyforge Tactics" color="#f8fafc" font-size="42" align="center" />
    <gd-label name="Subtitle" text="UI nativa gerada por .gdui.html" color="#94a3b8" font-size="18" align="center" />
    <gd-panel name="MenuPanel" background="#111827" radius="20" border="1" border-color="#334155" padding="24">
      <gd-vbox name="MenuButtons" gap="12">
        <gd-button name="PlayButton" text="Jogar" action="menu.play" min-height="48" variant="primary" />
        <gd-button name="SettingsButton" text="Configurações" action="menu.settings" min-height="48" />
        <gd-button name="ExitButton" text="Sair" action="menu.exit" min-height="48" />
      </gd-vbox>
    </gd-panel>
  </gd-vbox>
</gd-screen>
